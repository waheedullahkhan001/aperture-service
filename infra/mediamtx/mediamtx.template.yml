logLevel: info
logDestinations: [stdout]

# built-in playback server: serves a recording as one continuous, seekable, correct-duration
# MP4 over a time range (GET /get?path=...&start=<RFC3339>&duration=<s>&format=mp4) — this is how
# the web watch page scrubs recorded footage (native <video>), instead of raw fmp4 fragments.
# Auth: playback hits our auth hook with action "playback" (viewSecret + revoke apply). Reached
# publicly only via the nginx /playback/ proxy (port 9996 stays loopback/compose-internal).
playback: yes
playbackAddress: :9996

# Auth callback: mediamtx cannot send custom headers, but preserves this URL's
# query verbatim in every callback — the backend accepts ?secret= on this one path.
authMethod: http
authHTTPAddress: http://backend:8080/internal/streams/auth?secret=__WEBHOOK_SECRET__
authHTTPExclude:
  - action: api
  - action: metrics
  - action: pprof

# protocols we don't use
rtmp: false
srt: false
moq: false

rtspAddress: :8554
hlsAddress: :8888
webrtcAddress: :8889

paths:
  "~^aperture/[0-9a-fA-F-]{36}$":
    record: true
    recordPath: /data/recordings/%path/%Y-%m-%d_%H-%M-%S-%f
    recordFormat: fmp4
    recordSegmentDuration: 30s
    # deletion is exclusively the backend's job (default 1d would delete files
    # the DB still references)
    recordDeleteAfter: 0s

    # NOTE: hook names verified in Step 0 — there is no runOnPublish.
    # $MTX_QUERY arrives URL-encoded; the backend decodes it.
    runOnReady: >-
      curl -sS -o /dev/null -X POST http://backend:8080/internal/streams/hooks/publish-start
      -H "Content-Type: application/json"
      -H "Authorization: Bearer __WEBHOOK_SECRET__"
      -d "{\"path\":\"$MTX_PATH\",\"query\":\"$MTX_QUERY\"}"
    runOnReadyRestart: false

    runOnNotReady: >-
      curl -sS -o /dev/null -X POST http://backend:8080/internal/streams/hooks/publish-end
      -H "Content-Type: application/json"
      -H "Authorization: Bearer __WEBHOOK_SECRET__"
      -d "{\"path\":\"$MTX_PATH\"}"

    # normalize-segment.sh remuxes the segment (fixes non-monotonic DTS from phone,
    # adds faststart), then notifies the backend. See infra/mediamtx/normalize-segment.sh.
    runOnRecordSegmentComplete: /normalize-segment.sh
