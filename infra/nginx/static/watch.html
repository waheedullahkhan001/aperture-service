<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aperture — Live</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #111; color: #eee; }
    header { padding: 12px 16px; background: #1a1a1a; }
    h1 { font-size: 1rem; margin: 0; letter-spacing: .2em; }
    #meta { padding: 8px 16px; color: #aaa; font-size: .9rem; }
    #status { font-weight: 600; }
    #status.RECORDING { color: #e33; }
    #status.ENDED { color: #888; }
    video { width: 100%; max-height: 75vh; background: #000; display: block; }
    #msg { padding: 24px 16px; color: #c66; }
  </style>
</head>
<body>
  <header><h1>APERTURE — EMERGENCY STREAM</h1></header>
  <div id="meta">loading…</div>
  <video id="video" controls autoplay muted playsinline></video>
  <div id="msg"></div>
  <script>
    const id = location.pathname.split('/').pop();
    const t = new URLSearchParams(location.search).get('t') || '';
    const meta = document.getElementById('meta');
    const msg = document.getElementById('msg');
    const video = document.getElementById('video');
    let hls = null, playing = false;

    function render(d) {
      const started = new Date(d.startedAt).toLocaleString();
      meta.innerHTML = `<span id="status" class="${d.status}">${d.status}</span>
        &nbsp;·&nbsp; ${d.ownerName} &nbsp;·&nbsp; started ${started}`;
    }

    function play(hlsUrl) {
      if (playing) return;
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = hlsUrl;            // Safari — native HLS, cookies flow same-origin
        playing = true;
      } else if (window.Hls && Hls.isSupported()) {
        hls = new Hls();               // same-origin -> hlsSession cookie sent automatically
        hls.loadSource(hlsUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.ERROR, (_, data) => {
          if (data.fatal) { playing = false; hls.destroy(); hls = null; }
        });
        playing = true;
      } else {
        msg.textContent = 'This browser cannot play HLS.';
      }
    }

    async function tick() {
      try {
        const r = await fetch(`/api/public/watch/${id}?t=${encodeURIComponent(t)}`);
        if (!r.ok) {
          msg.textContent = r.status === 404 ? 'Stream not found or link expired.'
                                             : `Cannot load stream (HTTP ${r.status}).`;
          meta.textContent = '';
          return;
        }
        const d = await r.json();
        render(d);
        msg.textContent = d.status === 'ENDED' ? 'This stream has ended.' : '';
        if (d.status === 'RECORDING') play(d.hlsUrl);
      } catch (e) {
        msg.textContent = 'Network error — retrying…';
      }
    }

    tick();
    setInterval(tick, 5000);
  </script>
</body>
</html>
