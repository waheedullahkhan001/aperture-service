# Aperture HTTPS edge. jonasal/nginx-certbot auto-handles the :80 server (ACME
# challenge + redirect to HTTPS) and obtains/renews the cert named in the
# ssl_certificate_key path below — it parses that path to know which domain to
# request. __DOMAIN__ is substituted at image build time.

server {
    listen 443 ssl;
    http2 on;
    server_name __DOMAIN__;
    root /usr/share/nginx/html;

    ssl_certificate         /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/__DOMAIN__/chain.pem;
    ssl_dhparam             /etc/letsencrypt/dhparams/dhparam.pem;

    # container healthcheck (probe over https)
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # internal surfaces are never exposed through the public edge
    location /internal/ { return 404; }
    location /actuator/ { return 404; }

    # REST API -> Spring Boot
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # gap-fill clip uploads (POST .../clips) are multi-MB; nginx's 1MB default
        # was 413-rejecting them. 512M cap, kept in sync with the backend multipart
        # limit + Android's upload pre-skip (margin for a long offline whole-file
        # fallback; normal gap chunks are ~15MB).
        client_max_body_size 512M;
    }

    # WebRTC WHEP signaling -> MediaMTX (media/ICE not plumbed; HLS is the watch path)
    location ~ ^/aperture/.+/whep {
        proxy_pass http://mediamtx:8889;
        proxy_set_header Host $host;
    }

    # HLS -> MediaMTX. Path preserved verbatim: MediaMTX scopes its hlsSession cookie
    # to /aperture/<id>/, so rewriting the prefix breaks playback auth.
    location /aperture/ {
        proxy_pass http://mediamtx:8888;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # Recorded-timeline playback -> MediaMTX playback server (:9996). The web watch page
    # points a native <video> at /playback/get?path=aperture/<id>&start=<RFC3339>&duration=<s>
    # &format=mp4&t=<viewSecret> to scrub recorded footage. Auth is enforced by MediaMTX
    # calling our auth hook (action "playback", viewSecret + revoke). Trailing slash strips
    # the /playback prefix so /playback/get -> :9996/get and /playback/list -> :9996/list.
    location /playback/ {
        proxy_pass http://mediamtx:9996/;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # any /watch/<uuid> serves the single watch page (it reads the id from the path)
    location ~ "^/watch/[0-9a-fA-F-]{36}$" {
        try_files /watch.html =404;
    }

    # ES modules: nginx 1.31's mime.types maps .js but NOT .mjs, so .mjs would be
    # served as octet-stream and browsers refuse to load it as a module (breaks the
    # connect-string QR, which imports vendor/qrcode.mjs). Force the JS type for .mjs.
    location ~ \.mjs$ {
        default_type text/javascript;
        try_files $uri =404;
    }

    # static web UI (multi-page)
    location / {
        index index.html;
        try_files $uri $uri/ =404;
    }
}
