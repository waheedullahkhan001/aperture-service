spring:
  datasource:
    url: "${DB_URL}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
  jpa:
    hibernate:
      ddl-auto: update
  mail:
    host: "${SMTP_HOST}"
    port: "${SMTP_PORT:587}"
    username: "${SMTP_USER}"
    password: "${SMTP_PASSWORD}"
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
app:
  public-origin: "${APP_PUBLIC_ORIGIN}"
  recordings-path: "${APP_RECORDINGS_PATH:/data/recordings}"
  webhook-secret: "${MEDIAMTX_WEBHOOK_SECRET}"
  jwt:
    secret: "${JWT_SECRET}"
  streaming:
    hls-base: "${MEDIAMTX_HLS_BASE}"
    webrtc-base: "${MEDIAMTX_WEBRTC_BASE}"
logging:
  level:
    com.aperture: INFO
