spring:
  datasource:
    url: "${DB_URL}"
    username: "${DB_USERNAME}"
    password: "${DB_PASSWORD}"
  jpa:
    hibernate:
      ddl-auto: validate
  mail:
    host: "${SMTP_HOST}"
    port: "${SMTP_PORT:587}"
    username: "${SMTP_USER}"
    password: "${SMTP_PASSWORD}"
    properties:
      mail.smtp.auth: true
      # opportunistic STARTTLS (ignored when the connection is already TLS)
      mail.smtp.starttls.enable: true
      # implicit TLS for submission ports like 465 (e.g. Stalwart); false for
      # plain dev sinks like mailpit
      mail.smtp.ssl.enable: "${SMTP_SSL:false}"
app:
  public-origin: "${APP_PUBLIC_ORIGIN}"
  mail-from: "${APP_MAIL_FROM}"
  recordings-path: "${APP_RECORDINGS_PATH:/data/recordings}"
  webhook-secret: "${MEDIAMTX_WEBHOOK_SECRET}"
  jwt:
    secret: "${JWT_SECRET}"
  streaming:
    hls-base: "${MEDIAMTX_HLS_BASE}"
    webrtc-base: "${MEDIAMTX_WEBRTC_BASE}"
management:
  health:
    mail:
      # an unreachable/misconfigured SMTP server must not flip the container
      # unhealthy (and cascade into nginx's depends_on) — alert dispatch has
      # its own retry sweep, and mail failures are visible in logs
      enabled: false
logging:
  level:
    com.aperture: INFO
