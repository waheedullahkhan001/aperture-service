# 8081, not 8080: an unrelated auto-starting container (kycwallet) squats 8080 on the dev
# laptop AND answers /actuator/health with {"status":"UP"} — a convincing Aperture impostor.
server:
  port: 8081

spring:
  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:5432/aperture}"
    username: "${DB_USERNAME:aperture}"
    password: "${DB_PASSWORD:devpass}"
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema; Hibernate only verifies
logging:
  level:
    com.aperture: DEBUG
