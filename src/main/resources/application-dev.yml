spring:
  datasource:
    # ensure() uses a portable INSERT..WHERE NOT EXISTS (H2 2.4 rejects ON CONFLICT even in PG mode); duplicate-key races are caught in the adapter
    url: "jdbc:h2:mem:aperture;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
logging:
  level:
    com.aperture: DEBUG
