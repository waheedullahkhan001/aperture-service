spring:
  application:
    name: aperture-service
  profiles:
    default: dev
  task:
    scheduling:
      pool:
        size: 2   # dispatch tick (slow SMTP) must not starve the stale-recording failsafe sweeper
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
app:
  public-origin: "http://localhost"
  recordings-path: "/data/recordings"
  webhook-secret: "dev-webhook-secret-change-me"
  jwt:
    secret: "ZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZA=="
    access-ttl: 15m
  session:
    refresh-ttl: 720h
  streaming:
    hls-base: "http://localhost:8888"
    webrtc-base: "http://localhost:8889"
  schedule:
    dispatch-delay: 5s
    retry-delay: 5m
    sweep-delay: 60s
