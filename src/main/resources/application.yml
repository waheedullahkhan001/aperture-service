spring:
  application:
    name: aperture-service
  profiles:
    default: dev
  servlet:
    multipart:
      # 512MB cap for clip uploads — margin so a long fully-offline recording
      # (whole-file fallback) isn't dropped. Kept in sync with nginx
      # client_max_body_size and Android's upload pre-skip.
      max-file-size: 512MB
      max-request-size: 512MB
  task:
    scheduling:
      pool:
        size: 2   # dispatch tick (slow SMTP) must not starve the stale-recording failsafe sweeper
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
app:
  public-origin: "http://localhost"
  recordings-path: "/data/recordings"
  webhook-secret: "dev-webhook-secret-change-me"
  jwt:
    secret: "ZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZGRkZA=="
    access-ttl: 15m
  session:
    refresh-ttl: 720h
  streaming:
    hls-base: "http://localhost:8888"
    webrtc-base: "http://localhost:8889"
  schedule:
    dispatch-delay: 5s
    retry-delay: 5m
    sweep-delay: 60s
  rate-limit:
    login-per-minute: 5
    register-per-minute: 3
    password-reset-request-per-minute: 3
    resend-verification-per-minute: 3
