# Aperture — the whole product on one host. Deploy is: clone, fill .env,
# `docker compose up -d --build`. That single command brings up Postgres, the
# Spring Boot backend, MediaMTX, mailpit, and the nginx edge — which obtains and
# auto-renews its TLS cert by itself (no host cron, no manual cert step).
# Container set matches the submitted deployment diagram: Nginx, Spring Boot,
# MediaMTX, PostgreSQL (+ mailpit standing in for the external SMTP service until
# a real provider is wired). Only nginx (80/443) and RTSP (8554) face the public;
# the backend, HLS, WebRTC and mailpit ports stay bound to loopback behind nginx.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aperture
      POSTGRES_USER: aperture
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aperture -d aperture"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/aperture
      DB_USERNAME: aperture
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MEDIAMTX_WEBHOOK_SECRET: ${MEDIAMTX_WEBHOOK_SECRET}
      MEDIAMTX_HLS_BASE: ${MEDIAMTX_HLS_BASE}
      MEDIAMTX_WEBRTC_BASE: ${MEDIAMTX_WEBRTC_BASE}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SSL: ${SMTP_SSL:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      APP_MAIL_FROM: ${APP_MAIL_FROM}
      APP_PUBLIC_ORIGIN: ${APP_PUBLIC_ORIGIN}
      # APP_RECORDINGS_PATH defaults to /data/recordings — must equal the volume
      # mount path below and mediamtx's recordPath root.
    ports:
      # host 8080 is squatted by an unrelated auto-starting container — never bind it.
      # loopback-only: public API traffic goes through nginx.
      - "127.0.0.1:8081:8080"
    volumes:
      - recordings:/data/recordings
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      start_period: 40s
      retries: 5

  mediamtx:
    build: infra/mediamtx
    restart: unless-stopped
    environment:
      MEDIAMTX_WEBHOOK_SECRET: ${MEDIAMTX_WEBHOOK_SECRET}
    ports:
      - "8554:8554"             # RTSP publish (the phone) — the only public streaming port
      - "127.0.0.1:8888:8888"   # HLS — public access goes through nginx
      - "127.0.0.1:8889:8889"   # WebRTC/WHEP — same
      - "127.0.0.1:9996:9996"   # playback server (recorded-timeline) — loopback; public via nginx /playback/
    volumes:
      - recordings:/data/recordings
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8888/"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 5

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    environment:
      # the backend's prod mail config sets mail.smtp.auth=true, so mailpit must
      # advertise and accept (any) AUTH on an unencrypted connection
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    ports:
      - "127.0.0.1:8025:8025"   # web UI + API (loopback); SMTP (1025) stays compose-internal

  nginx:
    # self-contained edge: nginx + static web build + certbot auto-TLS, all in one
    # image (see infra/nginx/Dockerfile). DOMAIN is baked into the served config at
    # build time; CERTBOT_EMAIL drives Let's Encrypt registration at runtime.
    build:
      context: infra/nginx
      args:
        DOMAIN: ${DOMAIN}
    restart: unless-stopped
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
      # set STAGING=1 in .env while testing to avoid Let's Encrypt rate limits
      STAGING: ${CERTBOT_STAGING:-0}
      # local dev only: NGINX_USE_LOCAL_CA=1 makes jonasal self-sign instead of
      # contacting Let's Encrypt (which can't issue for "localhost"). Default 0 =
      # prod uses real Let's Encrypt. Set =1 in the local .env, never in prod.
      USE_LOCAL_CA: ${NGINX_USE_LOCAL_CA:-0}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt   # certs + dhparam persist here (jonasal writes them)
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-q", "--spider", "https://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 60s
      retries: 5

volumes:
  pgdata:
  recordings:
  letsencrypt:
